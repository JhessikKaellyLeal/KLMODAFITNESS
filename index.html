<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KL MODA FITNESS</title>
    <link rel="stylesheet" href="style/index.css">
</head>

<body>
    <!-- CABEÇALHO/MENU-->
    <header>
        <div class="topo">
                    <!-- LOGO -->
                    <div class="logo">
                        <img src="assets/logo.png" alt="Logo da KL Moda Fitness">  
                    </div>
                    <!-- caixa de pesquisa -->
                    <div class="caixa-pesquisa">
                        <img src="assets/pesquisablack.png" alt="Ícone de pesquisa"> 
                        <input type="text" placeholder="O que você está procurando?">
                     
                    </div>
                    <!-- ÍCONES -->
                    <div class="icones">
                        <a href="">
                            <img src="assets/usuario.png" alt="login">
                            <SMALL>Olá visitante</SMALL>
                            <p>ENTRAR</p>
                        </a>
                        <a href="">
                            <img src="assets/carrinho.png" alt="carrinho">
                            <SMALL>Meu</SMALL>
                            <p>CARRINHO</p>
                        </a>
                    </div>
        </div>  
        <!-- MENU DE NAVEGAÇÃO -->
        <NAV class="menu">
            <a href="#">LEGGINS</a>
            <a href="#">CONJUNTOS</a>
            <a href="#">TOP</a>
            <a id="idregata" href="#">REGATA</a>
            <a href="#">BODY</a>
            <a href="#">MACACÃO</a>
            <a href="#">BLOG</a>
        </NAV>
    </header>

    <!--AREA DO  BANNER DA LOJA -->
    <div class="banner">
        <div class="imagens-banner">
            <img src="assets/BANNER.png" alt="Banner 1">
        </div>
        <div class="botoes-banner">
                
                <button class="btn-anterior">
                    <img src="assets/anterior.png" alt="Seta para esquerda">
                </button>
                <button class="btn-comprar">Comprar</button>
                <button class="btn-proximo">
                    <img src="assets/proximo.png" alt="Seta para direita">
                </button>
        </div>

    </div>
   <!--FINALIZAÇÃO DA ÁREA DO BANNER DA LOJA-->
 
    
</body>

</html>
